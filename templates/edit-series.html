{% extends "layout.html" %}

{% block title %}Edit series{% endblock %}

{% block content %}

  <h2>Edit anime series</h2>

  {% for message in get_flashed_messages() %}
  <p class="flash">{{ message }}</p>
  {% endfor %}

  <form action="/edit-series/{{ series.id }}" method="post">
    <p>
      <label for="title">Title</label>:<br />
      <input type="text" id="title" name="title" maxlength="100" value="{{ filled.title }}" required />
    </p>
    <p>
      <label for="description">Description</label>:<br />
      <textarea id="description" name="description" rows="5" cols="40" maxlength="5000" required>{{ filled.description }}</textarea>
    </p>
    <p>
      <label for="year">Release year</label>:<br />
      <input type="number" id="year" name="year" min="1900" max="2050" value="{{ filled.year }}" required />
    </p>
    <p>
      <label for="episodes">Episodes</label>:<br />
      <input type="number" id="episodes" name="episodes" min="1" max="9999" value="{{ filled.episodes }}" required />
    </p>
    <p>
      Genres: <br />
      {% for genre in genres %}
      <label>
        <input type="checkbox" name="genres" value="{{ genre.id }}"
          {% if genre.id in selected_ids %}checked{% endif %} />
        {{ genre.name }}
      </label><br />
      {% endfor %}
    </p>
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="submit" value="Save changes">
  </form>

  <hr />
  <p>
    <a href="/series/{{ series.id }}">Cancel</a>
  </p>
  
{% endblock %}
