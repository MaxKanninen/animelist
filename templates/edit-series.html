<!DOCTYPE html>
<html>

<head>
  <title>Edit series</title>
</head>

<body>
  <h2>Edit anime series</h2>
  <form action="/edit-series/{{ series.id }}" method="post">
    <p>
      Title: <br />
      <input type="text" name="title" maxlength="100" value="{{ series.title }}" required />
    </p>
    <p>
      Description: <br />
      <textarea name="description" rows="5" cols="40" maxlength="5000" required>{{ series.description }}</textarea>
    </p>
    <p>
      Release year: <br />
      <input type="number" name="year" min="1900" max="2050" value="{{ series.year }}" required />
    </p>
    <p>
      Episodes: <br />
      <input type="number" name="episodes" min="1" max="9999" value="{{ series.episodes }}" required />
    </p>
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="submit" value="Save changes">
  </form>

  <hr />
  <p>
    <a href="/series/{{ series.id }}">Cancel</a>
  </p>
</body>

</html>
