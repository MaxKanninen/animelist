{% extends "layout.html" %}

{% block title %}All series{% endblock %}

{% block content %}

  <h2>All anime series</h2>

  {% for message in get_flashed_messages() %}
  <p class="flash">{{ message }}</p>
  {% endfor %}

  {% for series in series_list %}
  <div class="card">
    <a href="/series/{{ series.id }}">{{ series.title }}</a>
    <span class="meta"> &middot; {{ series.year }}</span>
  </div>
  {% endfor %}

{% endblock %}
