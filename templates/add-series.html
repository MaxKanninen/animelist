<!DOCTYPE html>
<html>

<head>
  <title>Add series</title>
</head>

<body>
  <h2>Add an anime series</h2>
  <form action="/add-series" method="post">
    <p>
      Title: <br />
      <input type="text" name="title" maxlength="100" required />
    </p>
    <p>
      Description: <br />
      <textarea name="description" rows="5" cols="40" maxlength="5000" required></textarea>
    </p>
    <p>
      Release year: <br />
      <input type="number" name="year" min="1900" max="2050" required />
    </p>
    <p>
      Episodes: <br />
      <input type="number" name="episodes" min="1" max="9999" required />
    </p>
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" /> 
    <input type="submit" value="Add series">
  </form>

  <hr />
  <p>
    <a href="/">Back to home page</a>
  </p>
</body>

</html>
