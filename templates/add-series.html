<!DOCTYPE html>
<html>

<head>
  <title>Add series</title>
</head>

<body>
  <h2>Add an anime series</h2>
  <form action="/add-series" method="post">
    <p>
      Title: <br />
      <input type="text" name="title" maxlength="100" />
    </p>
    <p>
      Description: <br />
      <textarea name="description" rows="5" cols="40" maxlength="5000"></textarea>
    </p>
    <p>
      Release year: <br />
      <input type="number" name="year" min="1900" max="2050"/>
    </p>
    <p>
      Episodes: <br />
      <input type="number" name="episodes" min="1" max="9999" />
    </p>
    <input type="submit" value="Add series">
  </form>

  <hr />
  <p>
    <a href="/">Back to home page</a>
  </p>
</body>

</html>
