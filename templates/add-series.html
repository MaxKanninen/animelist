{% extends "layout.html" %}

{% block title %}Add series{% endblock %}

{% block content %}

  <h2>Add an anime series</h2>

  {% for message in get_flashed_messages() %}
  <p class="flash">{{ message }}</p>
  {% endfor %}

  <form action="/add-series" method="post">
    <p>
      Title: <br />
      <input type="text" name="title" value="{{ filled.title }}" maxlength="100" required />
    </p>
    <p>
      Description: <br />
      <textarea name="description" rows="5" cols="40" maxlength="5000" required>{{ filled.description }}</textarea>
    </p>
    <p>
      Release year: <br />
      <input type="number" name="year" value="{{ filled.year }}"  min="1900" max="2050" required />
    </p>
    <p>
      Episodes: <br />
      <input type="number" name="episodes" value="{{ filled.episodes }}" min="1" max="9999" required />
    </p>
    <p>
      Genres: <br />
      {% for genre in genres %}
      <label>
        <input type="checkbox" name="genres" value="{{ genre.id }}"
          {% if genre.id in selected_ids %}checked{% endif %} />
        {{ genre.name }}
      </label><br />
      {% endfor %}
    </p>
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="submit" value="Add series">
  </form>

 {% endblock %}
