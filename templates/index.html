<!DOCTYPE html>
<html>

<head>
  <title>Animelist</title>
</head>

<body>
  <h1>Animelist</h1>
  <p>
    <a href="/series">View all anime series</a>
    <br />
    <br />
    <a href="/search">Search series</a>
    <br />
    <br />
    {% if session.user_id %}
    <a href="/add-series">Add an anime series</a>
    <br />
    <br />
    {% endif %}

    
  {% for message in get_flashed_messages() %}
  <p>
    <b>{{ message }}</b>
  </p>
  {% endfor %}
  
    {% if not session.user_id %}
    <a href="/registration">Register</a>
    {% endif %}
    <br />
    {% if session.user_id %}
    <a href="/logout">Log out</a>
    {% else %}
    <a href="/login">Log in</a>
    {% endif %}
  </p>
</body>

</html>
