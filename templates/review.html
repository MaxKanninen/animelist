{% extends "layout.html" %}

{% block title %}Review{% endblock %}

{% block content %}

  <h2>Review for "{{ series.title }}"</h2>

  {% for message in get_flashed_messages() %}
  <p class="flash">{{ message }}</p>
  {% endfor %}

  <form action="/series/{{ series.id }}/review" method="post">
    <p>
      Rate from 1-5: <br />
      <input type="number" name="rating" min="1" max="5" value="{{ filled.rating }}" required />
    </p>
    <p>
      Your review: <br />
      <textarea name="body" rows="5" cols="40" maxlength="5000" required>{{ filled.body }}</textarea>
    </p>
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="submit" value="Add review">
  </form>

  <hr />
  <p>
    <a href="/series/{{ series.id }}">Cancel</a>
  </p>

{% endblock %}
